<!DOCTYPE html>
<html>
    <head>
        <!-- Page title -->
        <title>Profile</title>

        <!-- Shared styles across the app -->
        <link rel="stylesheet" href="styles.css">

        <!-- Flatpickr styles -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

        <!-- Flatpickr library -->
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

        <!-- Main JavaScript file -->
        <!-- defer ensures DOM loads before script runs -->
        <script type="text/javascript" src="app.js" defer></script>
    </head>

    <!-- Reuses dashboard layout -->
    <body class="dashboard-page">

    <!-- Sidebar navigation -->
    <nav class="sidebar">
        <ul>

            <!-- Toggle sidebar visibility -->
            <li id="toggle-li">
                <button onclick=toggleSidebar() id="toggle-btn">
                    <img src="Images/double_arrow_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Double Arrow Icon Right">
                </button>
            </li>

            <!-- Active profile page -->
            <!-- NOTE: duplicate class attribute should be merged -->
            <li class="active" class="sidebar-top">
                <a href="profile.html">
                <img src="Images/account_circle_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Profile Icon">

                <!-- Displays current user's name -->
                <span class="username">User</span>
                </a>
            </li>

            <!-- Navigation grouping -->
            <li class="sidebar-section-label"><span>Main</span></li>

            <!-- Dashboard link -->
            <li>
                <a href="dashboard.html">
                <img src="Images/home_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Dashboard Icon">
                <span>Dashboard</span>
                </a>
            </li>

            <!-- Tasks dropdown -->
            <li>
                <button onclick=toggleSubMenu(this) class="dropdown-btn">
                <img src="Images/check_box_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Tasks Icon">
                <span>Tasks</span>
                <img src="Images/arrow_drop_down_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Dropdown Icon">
                </button>

                <!-- Hidden submenu for task filtering -->
                <ul class="tasks-sub-menu">
                    <div>
                        <li><a href="tasks-today.html">Today</a></li>
                        <li><a href="tasks-upcoming.html">Upcoming</a></li>
                        <li><a href="tasks-completed.html">Completed</a></li>
                    </div>
                </ul>
            </li>

            <li class="sidebar-divider"></li>
            <li class="sidebar-section-label"><span>General</span></li>

            <!-- Calendar link -->
            <li>
                <a href="calendar.html">
                <img src="Images/calendar_month_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Calendar Icon">
                <span>Calendar</span>
                </a>
            </li>

            <!-- Settings link -->
            <li>
                <a href="settings.html">
                <img src="Images/settings_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Settings Icon">
                <span>Settings</span>
                </a>
            </li>
            
            <li class="sidebar-divider"></li>

            <!-- Logout action -->
            <li class="logout">
                <a href=# onclick="event.preventDefault(); logout()">
                <img src="Images/logout_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Logout Icon">
                <span>Logout</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main content area -->
    <div class="dashboard-content">

        <!-- Page header -->
        <div class="dashboard-header">
            <h2>Profile</h2>
        </div>

        <!-- Layout separating nav and content -->
        <div class="settings-layout">

            <!-- Sub-navigation -->
            <nav class="settings-nav">
                <ul>
                    <li class="active"><a href="profile.html">Profile</a></li>
                    <li><a href="settings.html">Login & Security</a></li>
                </ul>
            </nav>

            <!-- Profile content -->
            <div class="settings-content">

                <!-- Profile image + actions -->
                <div class="settings-content-row1">

                    <!-- Default profile icon -->
                    <svg class="profile-svg" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff"><path d="M234-276q51-39 114-61.5T480-360q69 0 132 22.5T726-276q35-41 54.5-93T800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 59 19.5 111t54.5 93Zm146.5-204.5Q340-521 340-580t40.5-99.5Q421-720 480-720t99.5 40.5Q620-639 620-580t-40.5 99.5Q539-440 480-440t-99.5-40.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm100-95.5q47-15.5 86-44.5-39-29-86-44.5T480-280q-53 0-100 15.5T294-220q39 29 86 44.5T480-160q53 0 100-15.5ZM523-537q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Zm-43-43Zm0 360Z"/></svg>

                    <!-- Profile actions (delete/upload) -->
                    <div class="settings-content-row1-right">

                        <!-- Delete profile image -->
                        <svg class="delete-svg" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>

                        <!-- Upload new profile image -->
                        <svg class="upload-svg" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff"><path d="M440-320v-326L336-542l-56-58 200-200 200 200-56 58-104-104v326h-80ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
                    </div>
                </div>

                <hr class="settings-divider">

                <!-- Editable name section -->
                <div class="settings-content-row2">
                    <div class="settings-content-row2-left">
                        <p>Name</p>

                        <!-- Read-only until user clicks edit -->
                        <input class="profile-input" type="text" value="Username" id="display-name" readonly>
                    </div>

                    <div class="settings-content-row2-right">
                        <!-- Toggles edit mode -->
                        <button class="edit-button" onclick="toggleEdit('display-name', this)">
                            <p>Edit</p>
                        </button>
                    </div>
                </div>

                <hr class="settings-divider">

                <!-- Email/contact section -->
                <div class="settings-content-row3">
                    <div class="settings-content-row3-left">
                        <p>Contact</p>

                        <div class="email-row">
                            <small>Email Address:</small>

                            <!-- Read-only email field -->
                            <input class="profile-input" type="email" value="user@email.com" id="display-email" readonly>
                        </div>
                    </div>

                    <!-- Edit toggle -->
                    <div class="settings-content-row2-right" onclick="toggleEdit('display-email', this)">
                        <button class="edit-button">
                            <p>Edit</p>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
