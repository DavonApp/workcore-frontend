<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Forgot Password</title>
    </head>
    <body class="forgot-password-page">
        <div class="forgot-password-content">
            
            <h2>Reset your password</h2>
            <p>Enter your account email to receive a password reset link</p>

            <form class="forgot-password-form" id="forgot-password-form">
                <div class="forgot-password-form-group">
                    <label for="email-address">Email address</label>
                    <input type="text" id="email-address" placeholder="Enter your email address...">
                </div>
            </form>

            <button class="reset-password-button" type="submit" form="forgot-password-form">Reset Password</button>

            <p>Don't have an account? <a class="signup-links" href="signup.html">Sign up</a></p>
            
            <p>Already have an account? <a class="signup-links" href="login.html">Login</a></p>

            <p><a class="signup-links" href="index.html">Go Home</a></p>
        </div>
    </body>
</html>
