<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Email Sign Up</title>
    </head>
    <body class="email-signup-page">
        <div class="email-signup-content">

            <a href="signup.html" class="back-button">&#8592;</a>
            
            <h2>Sign Up</h2>
            <p>Enter your details below to get started.</p>
            <form class="signup-form" id="signup-form">
                <div class="signup-form-group">
                    <label for="email-address">Email address</label>
                    <input type="text" id="email-address" placeholder="Enter your email address...">
                </div>
                <div class="signup-form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password...">
                </div>
            </form>

            <button class="signup-email-button" type="submit" form="signup-form">Sign up with Email</button>

            <p>Already have an account? <a class="signup-links" href="login.html">Log in</a></p>

            <p><a class="signup-links" href="forgot-password.html">Forgot your password?</a></p>

            <div class="or-divider">
                <span>or</span>
            </div>

            <a class="signup-google-button" href=#>Continue with Google</a>

            <p>By signing up and creating an<br>
            account I accept <a class="signup-links" href=#>Terms of Use</a><br>
            and <a class="signup-links" href=#>Privacy Policy.</a></p>
        </div>
    </body>
</html>
