<!DOCTYPE html>
<html>
<head>
    <title>Tasks Today</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="app.js" defer></script>
</head>
<body class="dashboard-page">
    <nav class="sidebar">
        <ul>
            <li id="toggle-li">
                <button onclick=toggleSidebar() id="toggle-btn">
                    <img src="Images/double_arrow_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Double Arrow Icon Right">
                </button>
            </li>
            <li class="sidebar-top">
                <a href="profile.html">
                    <img src="Images/account_circle_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Profile Icon">
                    <span class="username">User</span>
                </a>
            </li>
            <li class="sidebar-section-label"><span>Main</span></li>
            <li>
                <a href="dashboard.html">
                    <img src="Images/home_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Dashboard Icon">
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <button onclick=toggleSubMenu(this) class="dropdown-btn">
                    <img src="Images/check_box_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Tasks Icon">
                    <span>Tasks</span>
                    <img src="Images/arrow_drop_down_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Dropdown Icon">
                </button>
                <ul class="tasks-sub-menu">
                    <div>
                        <li class="active"><a href="tasks-today.html">Today</a></li>
                        <li><a href="tasks-upcoming.html">Upcoming</a></li>
                        <li><a href="tasks-completed.html">Completed</a></li>
                    </div>
                </ul>
            </li>
            <li class="sidebar-divider"></li>
            <li class="sidebar-section-label"><span>General</span></li>
            <li>
                <a href="calendar.html">
                    <img src="Images/calendar_month_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Calendar Icon">
                    <span>Calendar</span>
                </a>
            </li>
            <li>
                <a href="settings.html">
                    <img src="Images/settings_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Settings Icon">
                    <span>Settings</span>
                </a>
            </li>
            <li class="sidebar-divider"></li>
            <li class="logout">
                <a href=#>
                    <img src="Images/logout_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Logout Icon">
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </nav>
    <div class="dashboard-content">
        <div class="dashboard-header">
            <h2>Today</h2>
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search tasks...">
                <button class="search-btn" onclick="toggleSearch()">
                    <img src="Images/search_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Search">
                </button>
            </div>
        </div>
        <div class="task-list" id="task-list"></div>
    </div>
</body>
</html>
