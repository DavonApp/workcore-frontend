<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Login</title>
    </head>
    <body class="login-page">
        <div class="login-content">

            <a href="signup.html" class="back-button">&#8592;</a>
            
            <h2>Login</h2>
            <p>Welcome Back!</p>
            <form class="login-form" id="login-form">
                <div class="login-form-group">
                    <label for="email-address">Email address</label>
                    <input type="text" id="email-address" placeholder="Enter your email address...">
                </div>
                <div class="login-form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password...">
                </div>
            </form>

            <button class="login-button" type="submit" form="login-form">Login</button>

            <p>Don't have an account? <a class="signup-links" href="signup.html">Sign up</a></p>

            <p><a class="signup-links" href="forgot-password.html">Forgot your password?</a></p>

            <div class="or-divider">
                <span>or</span>
            </div>

            <a class="signup-google-button" href=#>Continue with Google</a>

            <p>By signing up and creating an<br>
            account I accept <a class="signup-links" href="tos.html">Terms of Use</a><br>
            and <a class="signup-links" href="privacy-policy.html">Privacy Policy.</a></p>
        </div>
    </body>
</html>
