<!DOCTYPE html>
<html>
<head>
    <!-- External stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <!-- Main JavaScript file for handling interactivity -->
        <!-- defer ensures DOM loads before script runs -->
        <script type="text/javascript" src="app.js" defer></script>

    <!-- JavaScript file for handling login functionality -->
    <script type="text/javascript" src="login.js" defer></script>

    <!-- Page title for browser context -->
    <title>Login</title>
</head>

<body class="login-page">

    <!-- 
        Centered container 
    -->
    <div class="login-content">

        <!-- 
            Back navigation provides escape route,
        -->
        <a href="signup.html" class="back-button">&#8592;</a>
        
        <!-- Page intent -->
        <h2>Login</h2>

        <p>Welcome Back!</p>

        <!-- 
            Form is separated from submit button for layout flexibility.
        -->
        <form class="login-form" id="login-form">

            <!-- Email input -->
            <div class="login-form-group">

                <!-- Label improves accessibility and screen reader support -->
                <label for="email-address">Email address</label>

                <!-- 
                    Using required attribute for client-side validation.
                -->
                <input 
                    type="email" 
                    id="email-address"
                    required 
                    placeholder="Enter your email address...">
            </div>

            <!-- Password input -->
            <div class="login-form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        placeholder="Enter your password...">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" 
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

        </form>

        <!-- 
            Submit button uses "form" attribute to trigger submission
        -->
        <button 
            class="login-button" 
            type="submit" 
            form="login-form">
            Login
        </button>

        <!-- 
            Redirect for new users reduces friction and prevents dead ends.
        -->
        <p>
            Don't have an account? 
            <a class="signup-links" href="signup.html">Sign up</a>
        </p>

        <!-- Password recovery improves usability and retention -->
        <p>
            <a class="signup-links" href="forgot-password.html">
                Forgot your password?
            </a>
        </p>

        <!-- 
            Divider separates traditional login from OAuth options.
        -->
        <div class="or-divider">
            <span>or</span>
        </div>

        <!-- 
            Placeholder for third-party authentication (e.g., Firebase Google Auth).
            Demonstrates extensibility of authentication system.
        -->
        <a class="signup-google-button" href="http://localhost:8080/oauth2/authorization/google">
            Continue with Google
        </a>

        <!-- 
            Legal acknowledgment 
        -->
        <p>
            By signing up and creating an<br>
            account I accept 
            <a class="signup-links" href="tos.html">Terms of Use</a><br>
            and 
            <a class="signup-links" href="privacy-policy.html">
                Privacy Policy.
            </a>
        </p>

    </div>

</body>
</html>
