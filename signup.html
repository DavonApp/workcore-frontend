<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">

        <title>Sign Up</title>
    </head>

    <body class="signup-page">

        <!-- Main signup container centered on page -->
        <div class="signup-content">

            <!-- Back navigation to landing page -->
            <a href="index.html" class="back-button">&#8592;</a>
            
            <!-- Page title and short instruction -->
            <h2>Sign Up</h2>
            <p>Select an option to get started.</p>

            <!-- OAuth signup option (Google integration placeholder) -->
            <a class="signup-google-button" href="http://localhost:8080/oauth2/authorization/google">Sign up with Google</a>

            <!-- Email-based signup flow -->
            <a class="signup-email-button" href="email-signup.html">Sign up with Email</a>

            <!-- Redirect to login if user already has an account -->
            <p>Already have an account? <a class="signup-links" href="login.html">Log in</a></p>

            <!-- Password recovery route -->
            <p><a class="signup-links" href="forgot-password.html">Forgot your password?</a></p>

            <!-- Legal agreement section -->
            <p>
                By signing up and creating an<br>
                account I accept <a class="signup-links" href="tos.html">Terms of Use</a><br>
                and <a class="signup-links" href="privacy-policy.html">Privacy Policy.</a>
            </p>

        </div>
    </body>
</html>
